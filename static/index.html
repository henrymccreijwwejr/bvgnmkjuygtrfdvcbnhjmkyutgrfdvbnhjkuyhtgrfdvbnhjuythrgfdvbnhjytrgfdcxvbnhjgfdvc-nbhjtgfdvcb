<!DOCTYPE html>

<head>

  <script src="/atlas.register.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
   
      color: #ccc;
      font-family: monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 🌿 Grass canvas isolated in the background */
    #grassCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* Sits behind the central wrap */
      cursor: pointer;
    }

    .wrap {
      width: 420px;
      padding: 0 1rem;
      position: relative;
      z-index: 2; /* Sits completely above the grass effect */
      background: transparent; /* Changed to transparent so it doesn't block the grass */
    }

    h1 {
      font-size: 1.1rem;
      font-weight: normal;
      color: #fff;
      margin-bottom: 1.25rem;
      letter-spacing: 0.02em;
    }

    h1 span {
      color: #555;
      font-size: 0.85rem;
      margin-left: 0.4rem;

    form {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      background: #1a1a1a;

      font-size: 0.875rem;

    input:focus { border-color: #444; }
    input::placeholder { color: #444; }

    button {

    button:hover { background: #2a2a2a; color: #fff; }

    .links {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
    }

    .links a {
      color: #444;
      text-decoration: none;
    }

    .links a:hover { color: #888; }

<body>

  <!-- The grass canvas -->
  <canvas id="grassCanvas"></canvas>

  <div class="wrap">
    <h1>blacklink <span>powered by atlas</span></h1>
    <form id="f">
      <input id="u" type="text" placeholder="search or enter a url." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </form>
    <div class="links">
      <a href="https://github.com" target="_blank">github</a>
      <a href="https://discord.gg" target="_blank">discord</a>
      <a href="https://t.me" target="_blank">telegram</a>
    </div>
  </div>

  <!-- Original URL script -->
  <script>
    !function(){
      function enc(u){
        try{return btoa(encodeURIComponent(u)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"")}
        catch(e){return null}
      }
      function norm(s){
        s=s.trim();
        if(!s)return null;
        if(/^https?:\/\//i.test(s)){
          try{new URL(s);return s}catch(e){}
          return null;
        }
        if(/\.|^localhost(:\d+)?$/.test(s)){
          try{new URL("https://"+s);return"https://"+s}catch(e){}
        }
        return"https://duckduckgo.com"+encodeURIComponent(s);
      }
      document.getElementById("f").onsubmit=function(e){
        e.preventDefault();
        var v=document.getElementById("u").value;
        var n=norm(v);if(!n)return;
        var c=enc(n);if(!c)return;
        location.href="/atlas/"+c;
      };
    }();
  </script>

  <!-- Isolated Interactive Grass Script -->
  <script>
    const canvas = document.getElementById('grassCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    const blades = [];
    
    let clickX = null;
    let clickY = null;
    let clickTime = 0;
    const forceDuration = 1000; 
    const forceRadius = 150; 

    class GrassBlade {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.length = 15 + Math.random() * 25;
        this.angle = 0; 
        this.baseAngle = (Math.random() - 0.5) * 0.2; 
        this.color = `hsl(${110 + Math.random() * 30}, 60%, ${20 + Math.random() * 15}%)`;
        this.lean = 0;
      }

      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        
        const cx = this.x + Math.sin(this.angle + this.lean) * (this.length / 2);
        const cy = this.y - Math.cos(this.angle + this.lean) * (this.length / 2);
        const ex = this.x + Math.sin(this.angle + this.lean) * this.length;
        const ey = this.y - Math.cos(this.angle + this.lean) * this.length;

        ctx.quadraticCurveTo(cx, cy, ex, ey);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      update(time) {
        this.angle = this.baseAngle + Math.sin(time / 500 + this.x / 100) * 0.1;

        if (clickX !== null) {
          const elapsedTime = performance.now() - clickTime;
          
          if (elapsedTime < forceDuration) {
            const dx = this.x - clickX;
            const dy = this.y - clickY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < forceRadius) {
              const forceFactor = (1 - distance / forceRadius) * (1 - elapsedTime / forceDuration);
              const angleToClick = Math.atan2(dy, dx);
              this.lean += Math.cos(angleToClick) * forceFactor * 1.5;
            }
          }
        }
        this.lean *= 0.93;
      }
    }

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      
      blades.length = 0;
      const calculatedCount = Math.floor((width * height) / 300); // Slightly denser grass
      for (let i = 0; i < calculatedCount; i++) {
        blades.push(new GrassBlade());
      }
    }

    function animate(time) {
      ctx.clearRect(0, 0, width, height);
      
      for (let i = 0; i < blades.length; i++) {
        blades[i].update(time);
        blades[i].draw();
      }
      
      requestAnimationFrame(animate);
    }

    // Trigger click wave ONLY when clicking the grass canvas, not the form
    canvas.addEventListener('click', (e) => {
      clickX = e.clientX;
      clickY = e.clientY;
      clickTime = performance.now();
    });

    window.addEventListener('resize', resize);
    
    // Init
    resize();
    requestAnimationFrame(animate);
  </script>
</body>
